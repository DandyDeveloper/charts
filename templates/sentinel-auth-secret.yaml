{{- if and .Values.sentinel.auth (not (tpl ( .Values.sentinel.existingSecret | default "" ) . )) -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ template "redis-ha.fullname" . }}-sentinel
  namespace: {{ .Release.Namespace | quote }}
  labels:
{{ include "labels.standard" . | indent 4 }}
    {{- range $key, $value := .Values.extraLabels }}
    {{ $key }}: {{ $value | quote }}
    {{- end }}
type: Opaque
data:
  {{ .Values.sentinel.authKey }}: {{ required "sentinel.auth=true requires either .Values.sentinel.password or .Values.sentinel.existingSecret pointing at a Secret with key matching .Values.sentinel.authKey" .Values.sentinel.password | b64enc | quote }}
{{- end -}}