name: release

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - Chart.yaml

permissions:
  contents: write
  pages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "${GITHUB_ACTOR}"
          git config user.email "${GITHUB_ACTOR}@users.noreply.github.com"

      - uses: azure/setup-helm@v4
        with:
          version: v3.16.3

      - name: Package root chart
        run: |
          rm -rf .cr-release-packages .cr-index
          mkdir -p .cr-release-packages
          helm package . --destination .cr-release-packages

      - name: Install chart-releaser
        uses: helm/chart-releaser-action@v1.7.0
        with:
          install_only: true

      - name: Release chart
        run: |
          owner="${GITHUB_REPOSITORY%%/*}"
          repo="${GITHUB_REPOSITORY#*/}"

          cr upload \
            --owner "$owner" \
            --git-repo "$repo" \
            --commit "$GITHUB_SHA" \
            --config cr.yaml \
            --skip-existing

          cr index \
            --owner "$owner" \
            --git-repo "$repo" \
            --config cr.yaml \
            --pages-branch gh-pages \
            --push
        env:
          CR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
